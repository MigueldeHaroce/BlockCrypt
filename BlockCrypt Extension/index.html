<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css" />
    <script src="config.js"></script>
    <script src="recourses/ethers-5.2.umd.min.js" type="application/javascript"></script>
    <script src="crypto.js"></script>
    <script src="wallet.js"></script>

    <title>BlockCrypt</title>
</head>
<body id="body">
    <div id="mainContainer" class="bc-home">
        <div class="bc-tophead">
            <div class="bc-brand">
                <div class="bc-titlewrap">
                    <span class="bc-dot"></span>
                    <span class="bc-title">BlockCrypt</span>
                </div>
                <div class="bc-subtitle">by MigueldeHaro</div>
            </div>

            <div class="bc-identity">
                <div id="connectBtn">Connect wallet</div>
                <div id="userbox">
                    <div id="greetings">Welcome</div>
                    <div id="user"></div>
                </div>
            </div>
        </div>

        <div class="bc-inputrow">
            <input type="password" id="inputText" placeholder="Master password..." />
            <div id="access">
                <img src="Back Arrow.png" alt="unlock" id="submitImg" />
            </div>
        </div>
    </div>
    <script src="appfunctions.js"></script>
    <script src="smartcontract.js"></script>
</body>
</html>
